<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Global Shared SSoT Navigation Styles -->
  <link rel="stylesheet" href="https://withbora.io/wp-content/plugins/withbora-lms-bridge/withbora-global-nav.css">

  <style>
    :root {
      /* Trust Palette (Parent Theme) */
      --primary: #1A2B4A;
      --primary-light: #EFF6FF;
      --secondary: #2C5282;
      --accent: #3182CE;
      --success: #276749;
      --text: #1A202C;
      --text-light: #718096;
      --bg: #F7FAFC;
      --surface: #ffffff;
      --border: #E2E8F0;
      
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* Navbar */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* Hero - Trust Theme Banner */
    .hero {
      margin-top: 68px;
      background: linear-gradient(135deg, #1A2B4A 0%, #2C5282 100%);
      color: white;
      text-align: center;
      padding: 80px 20px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.05) 1.5px, transparent 1.5px);
      background-size: 24px 24px;
      opacity: 0.8;
    }
    .hero-content {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .hero-label {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 100px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.8px;
      display: inline-block;
      margin-bottom: 16px;
      text-transform: uppercase;
      color: #E2E8F0;
    }
    .hero h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 2.4rem;
      line-height: 1.25;
      margin-bottom: 12px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .hero p {
      font-size: 1.05rem;
      color: #E2E8F0;
      opacity: 0.9;
    }

    /* Main Grid */
    .main-container {
      max-width: 1100px;
      margin: 50px auto;
      padding: 0 20px;
    }

    /* Footer overrides */
    footer {
      background: #1A202C;
      color: #718096;
      padding: 40px 20px;
      border-top: 1px solid #2D3748;
      margin-top: 80px;
    }
    footer a {
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 2rem;
      }
    }
  <!-- MailerLite Universal -->
  <script>
      (function(w,d,e,u,f,l,n){w[f]=w[f]||function(){(w[f].q=w[f].q||[])
      .push(arguments);},l=d.createElement(e),l.async=1,l.src=u,
      n=d.getElementsByTagName(e)[0],n.parentNode.insertBefore(l,n);})
      (window,document,'script','https://assets.mailerlite.com/js/universal.js','ml');
      ml('account', '2502806');
  </script>
  <!-- End MailerLite Universal -->
</head>
<body>

  <!-- SSoT Dynamic Header -->
  <div id="withbora-header" data-subdomain="pedagogy"></div>

  {{ content }}

  <!-- SSoT Dynamic Footer -->
  <div id="withbora-footer"></div>

  <!-- SSoT Layout Loader script (Cache-busted) -->
  <script src="https://withbora.io/wp-content/plugins/withbora-lms-bridge/withbora-global-nav.js?v=2"></script>
</body>
</html>
